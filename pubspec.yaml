name: vanne_control_flutter
description: VanneControl Flutter - Valve management mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_svg: ^2.0.10+1
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  flutter_holo_date_picker: ^1.0.1
  fl_chart: ^0.69.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
